name: Capability catalog

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/sync-catalog.mjs
      - run: node scripts/check-generated.mjs
      - run: node scripts/check-i18n.mjs
      - name: Verify committed machine files match production
        run: git diff --exit-code -- capability-catalog.json llms.json api-manual/agent-api/agent-api.json
